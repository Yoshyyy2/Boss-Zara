<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #00ff41;
      --dim-green: #00b32c;
      --dark-green: #003b10;
      --bg: #0a0a0a;
      --red: #ff003c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.13) 0px,
        rgba(0,0,0,0.13) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* CRT vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 99;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.07;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 10;
      width: min(580px, 92vw);
      border: 1px solid #003b10;
      background: rgba(0, 8, 2, 0.93);
      box-shadow: 0 0 40px rgba(0,255,65,0.08), 0 0 1px rgba(0,255,65,0.3);
      padding: 48px 40px 40px;
      text-align: center;
    }

    /* Big 404 */
    .error-code {
      font-family: 'VT323', monospace;
      font-size: clamp(100px, 28vw, 160px);
      line-height: 0.9;
      color: var(--red);
      text-shadow: 0 0 24px rgba(255,0,60,0.55), 0 0 80px rgba(255,0,60,0.15);
      animation: glitch 5s infinite;
      display: block;
    }

    @keyframes glitch {
      0%, 88%, 100% { transform: none; text-shadow: 0 0 24px rgba(255,0,60,0.55); }
      90% { transform: translate(-4px, 1px) skewX(-3deg); text-shadow: 4px 0 0 cyan, -4px 0 0 var(--red); }
      92% { transform: translate(4px, -1px) skewX(2deg); text-shadow: -4px 0 0 cyan, 4px 0 0 var(--red); }
      94% { transform: translate(-1px, 2px); text-shadow: 0 0 24px rgba(255,0,60,0.55); }
    }

    .error-label {
      font-size: 0.85rem;
      color: var(--red);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 6px;
      margin-bottom: 32px;
      opacity: 0.85;
    }

    .divider {
      border: none;
      border-top: 1px solid #001f08;
      margin: 0 0 28px;
    }

    .message {
      font-size: 0.82rem;
      color: #009922;
      line-height: 1.9;
      margin-bottom: 30px;
      letter-spacing: 0.03em;
    }
    .message .highlight { color: var(--green); }
    .message .blink {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Contact box */
    .contact-box {
      border: 1px solid #002a0e;
      padding: 20px 24px;
      text-align: left;
      position: relative;
    }
    .contact-box::before {
      content: '> CONTACT YOSH';
      position: absolute;
      top: -10px;
      left: 16px;
      background: rgba(0,8,2,0.93);
      padding: 0 8px;
      font-size: 0.68rem;
      color: var(--dim-green);
      letter-spacing: 0.2em;
    }

    .contact-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid #001506;
      font-size: 0.8rem;
    }
    .contact-row:last-child { border-bottom: none; }

    .contact-row .key {
      color: #005018;
      min-width: 80px;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
    }
    .contact-row .val {
      color: var(--green);
    }
    .contact-row .val a {
      color: inherit;
      text-decoration: none;
    }
    .contact-row .val a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .online {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .footer {
      margin-top: 28px;
      font-size: 0.65rem;
      color: #003010;
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="card">
  <span class="error-code">404</span>
  <div class="error-label">page_not_found</div>

  <hr class="divider"/>

  <div class="message">
    Oops. The page you're looking for<br>
    <span class="highlight">doesn't exist</span> or has been moved.<br>
    Lost? Please reach out below<span class="blink">_</span>
  </div>

  <div class="contact-box">
    <div class="contact-row">
      <span class="key">name</span>
      <span class="val">Yosh</span>
    </div>
    <div class="contact-row">
      <span class="key">email</span>
      <span class="val"><a href="mailto:deguzmanyosh6@gmail.com">deguzmanyosh6@gmail.com</a></span>
    </div>
    <div class="contact-row">
      <span class="key">github</span>
      <span class="val"><a href="#">github.com/yoshyyy</a></span>
    </div>
    <div class="contact-row">
      <span class="key">status</span>
      <span class="val"><span class="online"></span>available</span>
    </div>
  </div>

  <div class="footer">
    <span>© yosh.dev</span>
    <span>HTTP 404</span>
  </div>
</div>

<script>
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  let cols, drops;

  function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.floor(canvas.width / 14);
    drops = Array(cols).fill(1);
  }

  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = '14px monospace';
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*';
    drops.forEach((y, i) => {
      ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 14, y * 14);
      if (y * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }

  init();
  window.addEventListener('resize', init);
  setInterval(draw, 50);
</script>

</body>
</html>
